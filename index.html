<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三角函數視覺化教學</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            display: flex;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
        }
        #canvas-container {
            flex: 1;
            height: 100%;
            display: block;
            min-width: 0;
            min-height: 0;
            position: relative;
            touch-action: none; /* 防止在畫布上滑動時觸發網頁捲動 */
        }
        #ui-container {
            position: relative;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
            width: clamp(280px, 30vw, 380px);
            margin: 0 20px;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            box-sizing: border-box;
            flex-shrink: 0;
            align-self: center;
            z-index: 5;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            color: #ffcc00;
        }
        p {
            margin: 5px 0 15px 0;
            font-size: 14px;
            line-height: 1.5;
            color: #ddd;
        }
        .tip {
            background: rgba(255, 204, 0, 0.2);
            border-left: 4px solid #ffcc00;
            padding: 8px 12px;
            border-radius: 0 4px 4px 0;
            margin-bottom: 15px;
            font-weight: bold;
            color: #ffdd44;
        }
        .legend {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            font-size: 16px;
            font-weight: bold;
        }
        .color-box {
            width: 16px;
            height: 16px;
            margin-right: 10px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .red-box { background-color: #ff3366; box-shadow: 0 0 8px #ff3366; }
        .blue-box { background-color: #33ccff; box-shadow: 0 0 8px #33ccff; }
        .green-box { background-color: #33ff33; box-shadow: 0 0 8px #33ff33; }
        
        #speed-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 12;
        }
        .speed-btn {
            width: 48px;
            height: 48px;
            padding: 0;
            border: 1px solid #4a4a4a;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.72);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
            appearance: none;
            -webkit-appearance: none;
        }
        .speed-btn-emoji {
            display: block;
            font-size: 24px;
            line-height: 1;
            transform: translateY(-1px);
            font-family: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
            pointer-events: none;
        }
        .speed-btn:hover {
            border-color: #ffcc00;
            color: #fff;
        }
        .speed-btn.active {
            border-color: #ffcc00;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.25);
        }
        #hud-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 4;
        }
        .data-tag {
            position: absolute;
            left: 0;
            top: 0;
            transform: translate(-9999px, -9999px);
            opacity: 0;
            padding: 5px 8px;
            border-radius: 999px;
            border: 1px solid #555;
            background: rgba(8, 8, 8, 0.82);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.02em;
            white-space: nowrap;
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 14px rgba(0, 0, 0, 0.35);
            animation: dataTagPulse 1.8s ease-in-out infinite;
            transition: opacity 120ms ease-out;
        }
        .data-tag.angle { border-color: #ffcc00; color: #ffdd66; }
        .data-tag.hyp { border-color: #bbbbbb; color: #e8e8e8; }
        .data-tag.adj { border-color: #33ccff; color: #66ddff; }
        .data-tag.opp { border-color: #ff3366; color: #ff6688; }
        .data-tag.tan { border-color: #33ff33; color: #66ff66; }
        .data-tag.arc {
            border-color: #bb88ff !important;
            color: #e0ccff !important;
            background: rgba(78, 34, 128, 0.32);
            box-shadow: 0 0 14px rgba(187, 136, 255, 0.35);
        }
        @keyframes dataTagPulse {
            0%, 100% { box-shadow: 0 0 14px rgba(0, 0, 0, 0.35); }
            50% { box-shadow: 0 0 18px rgba(255, 255, 255, 0.18); }
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .math-text {
            font-family: monospace;
            font-size: 15px;
            background: #222;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            line-height: 1.6;
        }

        /* 手機版螢幕優化 */
        @media (max-width: 768px) {
            body {
                display: flex;
                flex-direction: column;
                height: 100dvh;
                overflow: hidden;
            }
            #canvas-container {
                order: 1;
                position: relative;
                width: 100vw;
                height: auto;
                flex: 1;
                min-height: 0;
            }
            #ui-container {
                order: 2;
                position: relative;
                margin: 0;
                width: 100%;
                max-width: 100%;
                border-radius: 20px 20px 0 0;
                padding-top: 15px;
                padding-bottom: calc(15px + env(safe-area-inset-bottom));
                padding-left: calc(15px + env(safe-area-inset-left));
                padding-right: calc(15px + env(safe-area-inset-right));
                max-height: 45dvh;
                box-sizing: border-box;
                background: rgba(0, 0, 0, 0.85);
                align-self: stretch;
                flex-shrink: 0;
            }
            h1 { font-size: 20px; }
            p { font-size: 13px; margin: 5px 0 10px 0; }
            .legend { font-size: 14px; margin-bottom: 2px; }
            .math-text { font-size: 13px; padding: 8px; }
            #speed-control {
                top: calc(10px + env(safe-area-inset-top));
                right: calc(10px + env(safe-area-inset-right));
            }
            .speed-btn {
                width: 44px;
                height: 44px;
            }
            .speed-btn-emoji {
                font-size: 22px;
            }
            .data-tag {
                font-size: 11px;
                padding: 4px 7px;
            }
        }
    </style>
    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-container">
        <h1>神奇的三角函數</h1>
        
        <div class="legend">
            <div class="color-box red-box"></div>
            <span>Sine (正弦) = 高度</span>
        </div>
        
        <div class="legend">
            <div class="color-box blue-box"></div>
            <span>Cosine (餘弦) = 水平距離</span>
        </div>

        <div class="legend">
            <div class="color-box green-box"></div>
            <span>Tangent (正切) = 坡度/斜率</span>
        </div>

        <!-- 與學校課本結合的動態公式顯示 -->
        <div class="math-text">
            <div>角度 θ = <span id="angle-val">0</span>°</div>
            <div>
                <span style="color:#ff3366">sin(θ)</span> = 對邊 / 斜邊 = <span id="sin-val" style="color:#ff3366">0.00</span>
            </div>
            <div>
                <span style="color:#33ccff">cos(θ)</span> = 鄰邊 / 斜邊 = <span id="cos-val" style="color:#33ccff">1.00</span>
            </div>
            <div>
                <span style="color:#33ff33">tan(θ)</span> = 對邊 / 鄰邊 = <span id="tan-val" style="color:#33ff33">0.00</span>
            </div>
        </div>

    </div>

    <div id="canvas-container"></div>
    <div id="hud-layer">
        <div id="hud-angle" class="data-tag angle"></div>
        <div id="hud-hyp" class="data-tag hyp"></div>
        <div id="hud-adj" class="data-tag adj"></div>
        <div id="hud-opp" class="data-tag opp"></div>
        <div id="hud-tan" class="data-tag tan"></div>
        <div id="hud-arc" class="data-tag arc"></div>
    </div>
        <div id="speed-control">
            <button type="button" id="speed-toggle" class="speed-btn active" aria-label="切換速度" title="速度：慢速"><span class="speed-btn-emoji">🐢</span></button>
        </div>

    <script>
        // --- 1. 基本場景設定 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        // 為了讓物理投影看起來完美無變形，我們使用正交相機
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
        const minZoom = 0.5;
        const maxZoom = 4;
        const zoomSensitivity = 0.0015;
        const desktopZoomLevelStep = 0.1;
        const desktopZoomBoostLevels = 4;
        let wasMobileLayout = window.matchMedia('(max-width: 768px)').matches;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);
        renderer.domElement.style.display = 'block';
        camera.zoom = wasMobileLayout
            ? 1
            : THREE.MathUtils.clamp(minZoom + desktopZoomLevelStep * desktopZoomBoostLevels, minZoom, maxZoom);

        function getViewportSize() {
            return {
                width: Math.max(1, container.clientWidth),
                height: Math.max(1, container.clientHeight)
            };
        }

        function getCameraLayout() {
            const isMobile = window.matchMedia('(max-width: 768px)').matches;
            return {
                baseFrustumSize: isMobile ? 32 : 35,
                // 動畫主體固定在畫布由左到右約 2/5 的位置
                anchorNdcX: -0.2,
                // 手機版略微下移，避免視覺中心偏上
                anchorNdcY: isMobile ? -0.08 : 0.0
            };
        }

        function updateCamera(width, height) {
            const aspect = width / height;
            const layout = getCameraLayout();
            const baseFrustumSize = layout.baseFrustumSize;
            let currentFrustumSize = baseFrustumSize;
            
            if (aspect < 1) {
                currentFrustumSize = baseFrustumSize / aspect; 
            }

            camera.left = currentFrustumSize * aspect / -2;
            camera.right = currentFrustumSize * aspect / 2;
            camera.top = currentFrustumSize / 2;
            camera.bottom = currentFrustumSize / -2;

            const frustumWidth = camera.right - camera.left;
            const frustumHeight = camera.top - camera.bottom;
            const centerX = circleCenter.x - (layout.anchorNdcX * frustumWidth) / (2 * camera.zoom);
            const centerY = circleCenter.y - (layout.anchorNdcY * frustumHeight) / (2 * camera.zoom);

            camera.position.set(centerX, centerY, 10);
            camera.lookAt(centerX, centerY, 0);
            camera.updateProjectionMatrix();
        }

        function resizeScene() {
            const { width, height } = getViewportSize();
            const isMobile = window.matchMedia('(max-width: 768px)').matches;
            if (isMobile) {
                camera.zoom = 1;
            } else if (wasMobileLayout) {
                camera.zoom = THREE.MathUtils.clamp(
                    minZoom + desktopZoomLevelStep * desktopZoomBoostLevels,
                    minZoom,
                    maxZoom
                );
            }
            camera.zoom = THREE.MathUtils.clamp(camera.zoom, minZoom, maxZoom);
            wasMobileLayout = isMobile;
            renderer.setSize(width, height);
            updateCamera(width, height);
        }

        // --- 2. 定義數學與物理參數 ---
        const R = 10.00; // 圓的半徑
        let theta = 0; // 當前角度
        let speed = 0.008; 
        
        const circleCenter = new THREE.Vector3(-8, 8, 0);
        const wavePointsCount = 400;
        const waveSpacing = 0.15;

        resizeScene();

        // --- 3. 建立 3D 與 2D 物件 ---

        // (A) 建立單位圓
        const circleGeometry = new THREE.BufferGeometry();
        const circleVertices = [];
        for (let i = 0; i <= 64; i++) {
            const angle = (i / 64) * Math.PI * 2;
            circleVertices.push(
                circleCenter.x + R * Math.cos(angle), 
                circleCenter.y + R * Math.sin(angle), 
                0
            );
        }
        circleGeometry.setAttribute('position', new THREE.Float32BufferAttribute(circleVertices, 3));
        const circleMaterial = new THREE.LineBasicMaterial({ color: 0x666666, linewidth: 2 });
        const circleLine = new THREE.LineLoop(circleGeometry, circleMaterial);
        scene.add(circleLine);
        // 用紫色弧線凸顯目前角度對應的弧長（覆蓋在灰色圓框上）
        const arcSegments = 96;
        const arcPathGeo = new THREE.BufferGeometry();
        const arcPathVertices = new Float32Array((arcSegments + 1) * 3);
        arcPathGeo.setAttribute('position', new THREE.BufferAttribute(arcPathVertices, 3));
        arcPathGeo.setDrawRange(0, 0);
        const arcPathLine = new THREE.Line(
            arcPathGeo,
            new THREE.LineBasicMaterial({ color: 0xbb88ff, linewidth: 4 })
        );
        scene.add(arcPathLine);

        // (B) 建立中心十字線 (X軸與Y軸)
        const axesMaterial = new THREE.LineDashedMaterial({ color: 0x444444, dashSize: 0.5, gapSize: 0.5 });
        const xAxisGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(circleCenter.x - R - 2, circleCenter.y, 0),
            new THREE.Vector3(circleCenter.x + R + 4, circleCenter.y, 0)
        ]);
        const xAxis = new THREE.Line(xAxisGeo, axesMaterial);
        xAxis.computeLineDistances();
        scene.add(xAxis);

        const yAxisGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(circleCenter.x, circleCenter.y - R - 2, 0),
            new THREE.Vector3(circleCenter.x, circleCenter.y + R + 2, 0)
        ]);
        const yAxis = new THREE.Line(yAxisGeo, axesMaterial);
        yAxis.computeLineDistances();
        scene.add(yAxis);

        // (C) 建立旋轉的主角 (黃色星星)
        const pointGeometry = new THREE.SphereGeometry(0.5, 32, 32);
        const pointMaterial = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
        const movingPoint = new THREE.Mesh(pointGeometry, pointMaterial);
        scene.add(movingPoint);

        // 為了讓手機跟滑鼠更容易點擊到星星，建立一個透明的「放大版感應區」
        const hitGeometry = new THREE.SphereGeometry(1.5, 16, 16); 
        const hitMaterial = new THREE.MeshBasicMaterial({ visible: false });
        const hitMesh = new THREE.Mesh(hitGeometry, hitMaterial);
        movingPoint.add(hitMesh); // 綁定在星星上

        const radiusGeo = new THREE.BufferGeometry().setFromPoints([circleCenter, movingPoint.position]);
        const radiusLine = new THREE.Line(radiusGeo, new THREE.LineBasicMaterial({ color: 0xaaaaaa }));
        scene.add(radiusLine);

        // 繪製課本上的直角三角形兩股
        const adjGeo = new THREE.BufferGeometry().setFromPoints([circleCenter, circleCenter]);
        const adjLine = new THREE.Line(adjGeo, new THREE.LineBasicMaterial({ color: 0x33ccff, linewidth: 3 }));
        scene.add(adjLine);

        const oppGeo = new THREE.BufferGeometry().setFromPoints([circleCenter, circleCenter]);
        const oppLine = new THREE.Line(oppGeo, new THREE.LineBasicMaterial({ color: 0xff3366, linewidth: 3 }));
        scene.add(oppLine);

        // (D) Tangent 視覺化
        const tanWallGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(circleCenter.x + R, circleCenter.y - R * 2.5, 0),
            new THREE.Vector3(circleCenter.x + R, circleCenter.y + R * 2.5, 0)
        ]);
        const tanWallLine = new THREE.Line(tanWallGeo, new THREE.LineDashedMaterial({ color: 0x555555, dashSize: 0.3, gapSize: 0.3 }));
        tanWallLine.computeLineDistances();
        scene.add(tanWallLine);

        const tanGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const tanLine = new THREE.Line(tanGeo, new THREE.LineBasicMaterial({ color: 0x33ff33, linewidth: 4 }));
        scene.add(tanLine);

        const laserGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const laserLine = new THREE.Line(laserGeo, new THREE.LineDashedMaterial({ color: 0xffff00, dashSize: 0.4, gapSize: 0.2, opacity: 0.5, transparent: true }));
        scene.add(laserLine);

        // (E) 建立 Sine 與 Cosine 波浪
        const sinWaveGeo = new THREE.BufferGeometry();
        const sinWaveVertices = new Float32Array(wavePointsCount * 3);
        sinWaveGeo.setAttribute('position', new THREE.BufferAttribute(sinWaveVertices, 3));
        const sinWaveLine = new THREE.Line(sinWaveGeo, new THREE.LineBasicMaterial({ color: 0xff3366, linewidth: 2 }));
        scene.add(sinWaveLine);

        const cosWaveGeo = new THREE.BufferGeometry();
        const cosWaveVertices = new Float32Array(wavePointsCount * 3);
        cosWaveGeo.setAttribute('position', new THREE.BufferAttribute(cosWaveVertices, 3));
        const cosWaveLine = new THREE.Line(cosWaveGeo, new THREE.LineBasicMaterial({ color: 0x33ccff, linewidth: 2 }));
        scene.add(cosWaveLine);

        const dashMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.3, gapSize: 0.3 });
        const sinProjGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const sinProjLine = new THREE.Line(sinProjGeo, dashMat);
        scene.add(sinProjLine);

        const cosProjGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const cosProjLine = new THREE.Line(cosProjGeo, dashMat);
        scene.add(cosProjLine);


        // --- 4. 互動與 UI 控制 (新增滑鼠/觸控拖曳) ---
        const speedToggle = document.getElementById('speed-toggle');
        const speedToggleEmoji = speedToggle.querySelector('.speed-btn-emoji');
        const angleValDisplay = document.getElementById('angle-val');
        const sinValDisplay = document.getElementById('sin-val');
        const cosValDisplay = document.getElementById('cos-val');
        const tanValDisplay = document.getElementById('tan-val');
        const hudAngleTag = document.getElementById('hud-angle');
        const hudHypTag = document.getElementById('hud-hyp');
        const hudAdjTag = document.getElementById('hud-adj');
        const hudOppTag = document.getElementById('hud-opp');
        const hudTanTag = document.getElementById('hud-tan');
        const hudArcTag = document.getElementById('hud-arc');
        const projectedVec = new THREE.Vector3();

        const speedModes = [
            { value: 0, emoji: '⏸️', label: '暫停' },
            { value: 0.008, emoji: '🐢', label: '慢速' },
            { value: 0.03, emoji: '⚡', label: '快速' }
        ];
        let speedModeIndex = 1;

        function applySpeedMode(index) {
            const mode = speedModes[index];
            speed = mode.value;
            speedModeIndex = index;
            speedToggleEmoji.textContent = mode.emoji;
            speedToggle.title = `速度：${mode.label}`;
            speedToggle.setAttribute('aria-label', `切換速度（目前${mode.label}）`);
        }

        speedToggle.addEventListener('click', () => {
            applySpeedMode((speedModeIndex + 1) % speedModes.length);
        });
        applySpeedMode(speedModeIndex);

        window.addEventListener('resize', () => {
            resizeScene();
        }, false);

        // 桌機滑鼠滾輪縮放整個畫布
        container.addEventListener('wheel', (event) => {
            if (window.matchMedia('(max-width: 768px)').matches) {
                return;
            }
            event.preventDefault();
            const zoomFactor = Math.exp(-event.deltaY * zoomSensitivity);
            camera.zoom = THREE.MathUtils.clamp(camera.zoom * zoomFactor, minZoom, maxZoom);
            const { width, height } = getViewportSize();
            updateCamera(width, height);
        }, { passive: false });

        // 射線與游標設定
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        let isDragging = false;

        // 計算游標在畫面上的座標 (-1 到 1)
        function updatePointer(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
        }

        // 偵測滑鼠按下 / 手指觸碰
        container.addEventListener('pointerdown', (event) => {
            updatePointer(event);
            raycaster.setFromCamera(pointer, camera);
            
            // 檢查是否點擊到星星的感應區
            const intersects = raycaster.intersectObject(hitMesh);
            if (intersects.length > 0) {
                isDragging = true;
                container.style.cursor = 'grabbing';
            }
        });

        // 偵測滑鼠移動 / 手指拖曳
        window.addEventListener('pointermove', (event) => {
            updatePointer(event);
            raycaster.setFromCamera(pointer, camera);

            if (isDragging) {
                // 如果正在拖曳，計算游標與圓心的數學角度
                const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
                const target = new THREE.Vector3();
                raycaster.ray.intersectPlane(plane, target); // 計算游標在 3D 空間的位置
                
                const dx = target.x - circleCenter.x;
                const dy = target.y - circleCenter.y;
                
                // 使用反正切函數計算角度
                theta = Math.atan2(dy, dx);
                if (theta < 0) theta += Math.PI * 2; // 保持角度在 0 ~ 360 度之間
            } else {
                // 只是滑過星星時，改變游標樣式提示使用者可以點擊
                const intersects = raycaster.intersectObject(hitMesh);
                if (intersects.length > 0) {
                    container.style.cursor = 'grab';
                } else {
                    container.style.cursor = 'default';
                }
            }
        });

        // 偵測滑鼠放開 / 手指離開
        window.addEventListener('pointerup', () => {
            isDragging = false;
            container.style.cursor = 'default';
        });

        function signed(num) {
            return `${num >= 0 ? '+' : ''}${num.toFixed(2)}`;
        }

        function projectToScreen(x, y, rect) {
            projectedVec.set(x, y, 0).project(camera);
            return {
                x: rect.left + (projectedVec.x * 0.5 + 0.5) * rect.width,
                y: rect.top + (-projectedVec.y * 0.5 + 0.5) * rect.height,
                visible: projectedVec.z > -1 && projectedVec.z < 1
            };
        }

        function isRectOverlapping(a, b, gap = 6) {
            return !(
                a.right + gap < b.left ||
                a.left > b.right + gap ||
                a.bottom + gap < b.top ||
                a.top > b.bottom + gap
            );
        }

        function placeTagWithAvoidance(tag, point, text, offsetCandidates, placedRects, extraAvoidRects = [], gap = 6) {
            tag.textContent = text;
            const tagWidth = Math.max(tag.offsetWidth, 56);
            const tagHeight = Math.max(tag.offsetHeight, 22);

            if (!point.visible) {
                tag.style.opacity = '0';
                return null;
            }

            let bestRect = null;
            let bestOffset = null;

            for (const [offsetX, offsetY] of offsetCandidates) {
                const x = point.x + offsetX;
                const y = point.y + offsetY;
                const outOfBounds = x < -120 || x + tagWidth > window.innerWidth + 120 || y < -80 || y + tagHeight > window.innerHeight + 80;
                if (outOfBounds) {
                    continue;
                }

                const rect = {
                    left: x,
                    top: y,
                    right: x + tagWidth,
                    bottom: y + tagHeight
                };
                const hasOverlap = placedRects.some((placedRect) => isRectOverlapping(rect, placedRect, gap));
                const hasExtraOverlap = extraAvoidRects.some((avoidRect) => avoidRect && isRectOverlapping(rect, avoidRect, gap));
                if (!hasOverlap && !hasExtraOverlap) {
                    bestRect = rect;
                    bestOffset = [offsetX, offsetY];
                    break;
                }

                if (!bestRect) {
                    bestRect = rect;
                    bestOffset = [offsetX, offsetY];
                }
            }

            if (!bestRect || !bestOffset) {
                tag.style.opacity = '0';
                return null;
            }

            const finalX = point.x + bestOffset[0];
            const finalY = point.y + bestOffset[1];
            tag.style.transform = `translate(${Math.round(finalX)}px, ${Math.round(finalY)}px)`;
            tag.style.opacity = '1';
            placedRects.push(bestRect);
            return bestRect;
        }

        function forceSeparateTag(tag, point, text, placedRects, avoidRect, gap = 18) {
            if (!avoidRect || !point.visible) {
                tag.style.opacity = '0';
                return null;
            }

            tag.textContent = text;
            const tagWidth = Math.max(tag.offsetWidth, 56);
            const tagHeight = Math.max(tag.offsetHeight, 22);

            const x = Math.max(8, Math.min(window.innerWidth - tagWidth - 8, point.x + 12));
            let y = avoidRect.bottom + gap;

            if (y + tagHeight > window.innerHeight - 8) {
                y = avoidRect.top - tagHeight - gap;
            }

            if (y < 8 || y + tagHeight > window.innerHeight - 8) {
                tag.style.opacity = '0';
                return null;
            }

            const rect = { left: x, top: y, right: x + tagWidth, bottom: y + tagHeight };
            const hasOverlap = placedRects.some((placedRect) => isRectOverlapping(rect, placedRect, 6));
            if (hasOverlap) {
                tag.style.opacity = '0';
                return null;
            }

            tag.style.transform = `translate(${Math.round(x)}px, ${Math.round(y)}px)`;
            tag.style.opacity = '1';
            placedRects.push(rect);
            return rect;
        }

        function placeTagAtScreen(tag, text, x, y, centerX = false) {
            tag.textContent = text;
            const tagWidth = Math.max(tag.offsetWidth, 56);
            const tagHeight = Math.max(tag.offsetHeight, 22);
            const leftX = centerX ? x - tagWidth * 0.5 : x;
            const clampedX = Math.max(8, Math.min(window.innerWidth - tagWidth - 8, leftX));
            const clampedY = Math.max(8, Math.min(window.innerHeight - tagHeight - 8, y));
            tag.style.transform = `translate(${Math.round(clampedX)}px, ${Math.round(clampedY)}px)`;
            tag.style.opacity = '1';
            return {
                left: clampedX,
                top: clampedY,
                right: clampedX + tagWidth,
                bottom: clampedY + tagHeight
            };
        }

        function updateHudTags({
            normalizedTheta,
            displayDeg,
            currentX,
            currentY,
            tanX,
            tanY,
            sinValue,
            cosValue,
            displayTan
        }) {
            const rect = renderer.domElement.getBoundingClientRect();
            // 斜邊標籤固定在圓的正上方外側
            const hypAnchorX = circleCenter.x;
            const hypAnchorY = circleCenter.y + R;
            const adjMidX = (circleCenter.x + currentX) * 0.5;
            const adjMidY = circleCenter.y;
            const oppMidX = currentX;
            const oppMidY = (circleCenter.y + currentY) * 0.5;
            // 弧長標籤固定在圓圈左上角外
            const arcX = circleCenter.x - R - 2.8;
            const arcY = circleCenter.y + R + 1.5;
            const placedRects = [];
            const anglePoint = projectToScreen(currentX, currentY, rect);
            const hypPoint = projectToScreen(hypAnchorX, hypAnchorY, rect);
            const adjPoint = projectToScreen(adjMidX, adjMidY, rect);
            const oppPoint = projectToScreen(oppMidX, oppMidY, rect);
            const tanUpperPoint = projectToScreen(circleCenter.x + R, circleCenter.y + R * 1.05, rect);
            const tanLowerPoint = projectToScreen(circleCenter.x + R, circleCenter.y - R * 1.05, rect);
            const arcPoint = projectToScreen(arcX, arcY, rect);

            placeTagWithAvoidance(
                hudAngleTag,
                anglePoint,
                `θ ${displayDeg}° • ${normalizedTheta.toFixed(2)} rad`,
                [[16, -34], [16, 12], [-160, -34], [-160, 12]],
                placedRects
            );
            const hypRect = placeTagAtScreen(
                hudHypTag,
                `斜邊 r ${R.toFixed(2)}`,
                hypPoint.x,
                hypPoint.y - 64,
                true
            );
            placedRects.push(hypRect);
            // 水平 x 固定在藍線附近，並加入避讓清單避免高度標籤重疊
            const adjRect = placeTagAtScreen(
                hudAdjTag,
                `水平 x ${signed(R * cosValue)}`,
                adjPoint.x + 10,
                adjPoint.y + 12
            );
            placedRects.push(adjRect);

            const lockOppLeftOfBall = displayDeg >= 180 && displayDeg <= 328;
            const stabilizeLeftBoundary = displayDeg >= 328 && displayDeg <= 329;
            const forceLeftStable = lockOppLeftOfBall || stabilizeLeftBoundary;
            const nearRightBoundary = displayDeg >= 330 || displayDeg <= 20;
            const oppLabelPoint = (nearRightBoundary || forceLeftStable) ? anglePoint : oppPoint;
            const oppCandidates = forceLeftStable
                ? [[-116, 8], [-116, 28], [-94, 8], [-94, 28]]
                : nearRightBoundary
                    ? [[24, 10], [24, 30], [42, 10], [42, 30], [12, 20], [-130, 20], [12, 46], [-130, 46]]
                    : [[12, 20], [-130, 20], [12, 46], [-130, 46]];
            let oppRect = null;
            if (forceLeftStable) {
                // 邊界角度固定左側，避免 328~329 度抖動
                oppRect = placeTagAtScreen(
                    hudOppTag,
                    `高度 y ${signed(R * sinValue)}`,
                    anglePoint.x - 112,
                    anglePoint.y + 14
                );
                placedRects.push(oppRect);
            } else {
                oppRect = placeTagWithAvoidance(
                    hudOppTag,
                    oppLabelPoint,
                    `高度 y ${signed(R * sinValue)}`,
                    oppCandidates,
                    placedRects,
                    [hypRect, adjRect],
                    18
                );
                if (!oppRect) {
                    oppRect = forceSeparateTag(
                        hudOppTag,
                        oppLabelPoint,
                        `高度 y ${signed(R * sinValue)}`,
                        placedRects,
                        nearRightBoundary ? adjRect : hypRect,
                        22
                    );
                }
            }
            // 切線標籤固定在圓右側的上/下中段
            placeTagAtScreen(
                hudTanTag,
                `切線 tanθ ${displayTan}`,
                (tanY >= circleCenter.y ? tanUpperPoint.x : tanLowerPoint.x) + 12,
                (tanY >= circleCenter.y ? tanUpperPoint.y : tanLowerPoint.y) - 10
            );
            placeTagWithAvoidance(
                hudArcTag,
                arcPoint,
                `弧長 s ${(R * normalizedTheta).toFixed(2)}`,
                [[0, 0]],
                []
            );
        }

        // --- 5. 動畫迴圈 (核心物理規律計算) ---
        function animate() {
            requestAnimationFrame(animate);

            // 當沒有在拖曳星星時，才讓它自動旋轉
            if (!isDragging) {
                theta += speed;
            }
            
            // 計算 Sine 和 Cosine
            const sinValue = Math.sin(theta);
            const cosValue = Math.cos(theta);
            
            const currentX = circleCenter.x + R * cosValue;
            const currentY = circleCenter.y + R * sinValue;

            // 更新星星與半徑
            movingPoint.position.set(currentX, currentY, 0);
            
            const radiusPositions = radiusLine.geometry.attributes.position.array;
            radiusPositions[3] = currentX;
            radiusPositions[4] = currentY;
            radiusLine.geometry.attributes.position.needsUpdate = true;

            // 更新直角三角形
            const adjPositions = adjLine.geometry.attributes.position.array;
            adjPositions[0] = circleCenter.x;
            adjPositions[1] = circleCenter.y;
            adjPositions[3] = currentX;
            adjPositions[4] = circleCenter.y;
            adjLine.geometry.attributes.position.needsUpdate = true;

            const oppPositions = oppLine.geometry.attributes.position.array;
            oppPositions[0] = currentX;
            oppPositions[1] = circleCenter.y;
            oppPositions[3] = currentX;
            oppPositions[4] = currentY;
            oppLine.geometry.attributes.position.needsUpdate = true;

            // --- 更新 Tangent 視覺化 ---
            let rawTan = Math.tan(theta);
            let displayTan = rawTan.toFixed(2);
            
            if (Math.abs(cosValue) < 0.001) {
                displayTan = "∞";
                rawTan = rawTan > 0 ? 100 : -100;
            }
            
            const maxVisualTan = 2.5; 
            let visualTan = rawTan;
            if (visualTan > maxVisualTan) visualTan = maxVisualTan;
            if (visualTan < -maxVisualTan) visualTan = -maxVisualTan;

            const tanX = circleCenter.x + R;
            const tanY = circleCenter.y + R * visualTan;

            const tanPositions = tanLine.geometry.attributes.position.array;
            tanPositions[0] = tanX;
            tanPositions[1] = circleCenter.y;
            tanPositions[3] = tanX;
            tanPositions[4] = tanY;
            tanLine.geometry.attributes.position.needsUpdate = true;

            const laserPositions = laserLine.geometry.attributes.position.array;
            laserPositions[0] = circleCenter.x;
            laserPositions[1] = circleCenter.y;
            laserPositions[3] = tanX;
            laserPositions[4] = tanY;
            laserLine.geometry.attributes.position.needsUpdate = true;
            laserLine.computeLineDistances();


            // --- 更新 Sine 波浪 ---
            const sinPositions = sinWaveLine.geometry.attributes.position.array;
            const sinStartX = circleCenter.x + R + 5; 
            for (let i = 0; i < wavePointsCount; i++) {
                const histTheta = theta - (i * waveSpacing); 
                sinPositions[i * 3] = sinStartX + (i * waveSpacing * 2); 
                sinPositions[i * 3 + 1] = circleCenter.y + R * Math.sin(histTheta); 
                sinPositions[i * 3 + 2] = 0;
            }
            sinWaveLine.geometry.attributes.position.needsUpdate = true;

            // --- 更新 Cosine 波浪 ---
            const cosPositions = cosWaveLine.geometry.attributes.position.array;
            const cosStartY = circleCenter.y - R - 3; 
            for (let i = 0; i < wavePointsCount; i++) {
                const histTheta = theta - (i * waveSpacing);
                cosPositions[i * 3] = circleCenter.x + R * Math.cos(histTheta); 
                cosPositions[i * 3 + 1] = cosStartY - (i * waveSpacing * 2); 
                cosPositions[i * 3 + 2] = 0;
            }
            cosWaveLine.geometry.attributes.position.needsUpdate = true;

            // --- 更新投影追蹤虛線 ---
            const sinProjPositions = sinProjLine.geometry.attributes.position.array;
            sinProjPositions[0] = currentX;
            sinProjPositions[1] = currentY;
            sinProjPositions[3] = sinStartX;
            sinProjPositions[4] = currentY; 
            sinProjLine.geometry.attributes.position.needsUpdate = true;
            sinProjLine.computeLineDistances();

            const cosProjPositions = cosProjLine.geometry.attributes.position.array;
            cosProjPositions[0] = currentX;
            cosProjPositions[1] = currentY;
            cosProjPositions[3] = currentX; 
            cosProjPositions[4] = cosStartY;
            cosProjLine.geometry.attributes.position.needsUpdate = true;
            cosProjLine.computeLineDistances();

            // 更新 UI 數字
            const fullTurn = Math.PI * 2;
            const normalizedTheta = ((theta % fullTurn) + fullTurn) % fullTurn;
            const displayDeg = Math.floor(normalizedTheta * 180 / Math.PI);
            // 更新紫色弧長路徑
            const arcPositions = arcPathGeo.attributes.position.array;
            const arcPointCount = Math.max(2, Math.ceil((normalizedTheta / fullTurn) * arcSegments) + 1);
            for (let i = 0; i < arcPointCount; i++) {
                const t = i / (arcPointCount - 1);
                const angle = normalizedTheta * t;
                arcPositions[i * 3] = circleCenter.x + R * Math.cos(angle);
                arcPositions[i * 3 + 1] = circleCenter.y + R * Math.sin(angle);
                arcPositions[i * 3 + 2] = 0;
            }
            arcPathGeo.setDrawRange(0, arcPointCount);
            arcPathGeo.attributes.position.needsUpdate = true;

            angleValDisplay.innerText = displayDeg.toString().padStart(3, '0');
            sinValDisplay.innerText = sinValue.toFixed(2);
            cosValDisplay.innerText = cosValue.toFixed(2);
            tanValDisplay.innerText = displayTan; 
            updateHudTags({
                normalizedTheta,
                displayDeg,
                currentX,
                currentY,
                tanX,
                tanY,
                sinValue,
                cosValue,
                displayTan
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
